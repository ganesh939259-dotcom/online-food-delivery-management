apiVersion: apps/v1
kind: Deployment

metadata:
  name: food-order-app

spec:
  replicas: 3

  selector:
    matchLabels:
      app: food-order

  template:
    metadata:
      labels:
        app: food-order

    spec:
      containers:
      - name: food-order

        image: your-dockerhub-username/food-order:latest

        ports:
        - containerPort: 5000