{% extends "base.html" %}

{% block content %}

<div class="container py-5">

    <h1 class="text-center text-white mb-5">
        🍽 Our Delicious Menu
    </h1>

    <div class="row">

        {% for food in foods %}

        <div class="col-lg-4 col-md-6 mb-4">

            <div class="card shadow-lg h-100">

                <img src="{{ url_for('static', filename='images/' + food.image) }}"
                     class="card-img-top"
                     height="250"
                     style="object-fit:cover;">

                <div class="card-body text-center">

                    <h3>{{ food.name }}</h3>

                    <h4>₹{{ food.price }}</h4>

                    <a href="/add_to_cart/{{ food.id }}"
                       class="btn btn-warning w-100">

                        🛒 Add to Cart

                    </a>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

{% endblock %}
