<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Ordering System</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

    body{
        background-image:url("{{ url_for('static', filename='images/food-bg.png') }}");
        background-size:cover;
        background-position:center;
        background-repeat:no-repeat;
        background-attachment:fixed;
        min-height:100vh;
        font-family:Arial, Helvetica, sans-serif;
    }

    /* Dark Overlay */
    .overlay{
        background:rgba(0,0,0,0.70);
        min-height:100vh;
    }

    /* Navbar */
    .navbar{
        background:rgba(0,0,0,0.85)!important;
        box-shadow:0 3px 15px rgba(0,0,0,.5);
    }

    .navbar-brand{
        font-size:30px;
        font-weight:bold;
        color:#ffc107 !important;
    }

    .nav-link{
        color:white !important;
        font-size:18px;
        margin-left:15px;
        transition:.3s;
    }

    .nav-link:hover{
        color:#ffc107 !important;
    }

    /* Home Hero */
    .hero{
        min-height:90vh;
        display:flex;
        justify-content:center;
        align-items:center;
        flex-direction:column;
        color:white;
        text-align:center;
    }

    /* ================= MENU CARDS ================= */

    .card{
        background:transparent !important;
        border:1px solid rgba(255,255,255,.15);
        border-radius:18px;
        overflow:hidden;
        box-shadow:0 12px 25px rgba(0,0,0,.45);
        transition:all .35s ease;
    }

    .card:hover{
        transform:translateY(-8px);
        box-shadow:0 20px 40px rgba(0,0,0,.7);
    }

    .card-img-top{
        width:100%;
        height:260px;
        object-fit:cover;
    }

    .card-body{
        background:linear-gradient(180deg,#3b0d18,#220810) !important;
        color:white !important;
        padding:25px;
    }

    .card-body h3{
        color:white !important;
        font-size:32px;
        font-weight:bold;
    }

    .card-body h4{
        color:#ffc107 !important;
        font-size:34px;
        font-weight:bold;
        margin:15px 0;
    }

    /* Buttons */

    .btn-warning{
        background:#ffc107;
        color:black;
        border:none;
        border-radius:12px;
        font-size:22px;
        font-weight:bold;
        padding:10px;
        transition:.3s;
    }

    .btn-warning:hover{
        background:#ffca2c;
        transform:scale(1.03);
    }

    </style>

</head>

<body>

<div class="overlay">

<nav class="navbar navbar-expand-lg navbar-dark">

<div class="container">

<a class="navbar-brand" href="/">🍕 Food Order</a>

<button class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav">

<span class="navbar-toggler-icon"></span>

</button>

<div class="collapse navbar-collapse" id="navbarNav">

<div class="navbar-nav ms-auto">

<a class="nav-link" href="/">🏠 Home</a>

<a class="nav-link" href="/menu">🍽 Menu</a>

<a class="nav-link" href="/cart">🛒 Cart</a>

{% if session.get("user") %}

<span class="navbar-text text-warning fw-bold me-3">
Welcome, {{ session["user"] }}
</span>

<a class="nav-link" href="/logout">🚪 Logout</a>

{% else %}

<a class="nav-link" href="/login">🔑 Login</a>

<a class="nav-link" href="/register">📝 Register</a>

{% endif %}

</div>

</div>

</div>

</nav>

{% block content %}
{% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
